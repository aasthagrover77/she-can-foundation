<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>She Can Foundation</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ffe6f0,#fff5f9);
    }

    .container{
      background:white;
      width:90%;
      max-width:450px;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      animation:fadeIn 1s ease;
    }

    h1{
      text-align:center;
      color:#ff4f8b;
      margin-bottom:10px;
    }

    p{
      text-align:center;
      color:#666;
      margin-bottom:30px;
    }

    .input-group{
      margin-bottom:20px;
    }

    input,
    textarea{
      width:100%;
      padding:14px;
      border:1px solid #ddd;
      border-radius:10px;
      font-size:16px;
      outline:none;
      transition:0.3s;
    }

    input:focus,
    textarea:focus{
      border-color:#ff4f8b;
      box-shadow:0 0 10px rgba(255,79,139,0.2);
    }

    textarea{
      resize:none;
      height:120px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#ff4f8b;
      color:white;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#e63c78;
      transform:translateY(-2px);
    }

    #success-message{
      display:none;
      text-align:center;
      color:green;
      margin-top:20px;
      font-weight:600;
      animation:fadeIn 0.5s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* Responsive */

    @media(max-width:500px){

      .container{
        padding:25px;
      }

      h1{
        font-size:28px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <h1>She Can Foundation</h1>

    <p>We would love to hear from you 💖</p>

    <form id="contactForm">

      <div class="input-group">
        <input type="text" placeholder="Enter Your Name" required>
      </div>

      <div class="input-group">
        <input type="email" placeholder="Enter Your Email" required>
      </div>

      <div class="input-group">
        <textarea placeholder="Enter Your Message" required></textarea>
      </div>

      <button type="submit">
        Submit
      </button>

    </form>

    <div id="success-message">
      Form Submitted Successfully 🎉
    </div>

  </div>

  <script>

    const form = document.getElementById("contactForm");
    const successMessage = document.getElementById("success-message");

    form.addEventListener("submit", function(event){

      event.preventDefault();

      successMessage.style.display = "block";

      form.reset();

    });

  </script>

</body>
</html>
